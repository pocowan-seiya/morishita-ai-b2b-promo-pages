<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>対談3｜AI×B2Bプロジェクトの全貌</title>
  <meta name="description" content="江藤せいやと森下さんの対談動画3。AI時代のチャンスを、自分の経験や視点を生かして、企業やお店に役立つ仕事の形へどう変えていくかを話しています。">
  <style>
    :root { --ink:#172026; --muted:#5c6870; --line:#e5edf0; --bg:#f6fbfb; --card:#ffffff; --accent:#16a3a8; --accent-dark:#0d7f84; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(180deg,#f4fbfb 0%,#ffffff 42%,#f7fbfa 100%); line-height:1.8; }
    .wrap { width:min(980px, calc(100% - 32px)); margin:0 auto; padding:42px 0 56px; }
    .hero { text-align:center; margin-bottom:28px; }
    .label { display:inline-block; padding:6px 14px; border:1px solid #bfe7e9; border-radius:999px; color:#0d7f84; background:#ecfbfb; font-weight:700; font-size:14px; margin-bottom:16px; }
    h1 { font-size:clamp(28px,5vw,46px); line-height:1.32; letter-spacing:.02em; margin:0 0 16px; font-weight:800; }
    .lead { color:var(--muted); font-size:clamp(16px,2vw,19px); margin:0 auto; max-width:720px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:26px; box-shadow:0 18px 50px rgba(24,70,72,.08); padding:clamp(18px,3vw,30px); }
    .video { position:relative; width:100%; aspect-ratio:16/9; border-radius:18px; overflow:hidden; background:#dfe9ea; }
    .video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
    .below { max-width:760px; margin:28px auto 0; text-align:center; }
    .below h2 { font-size:clamp(22px,3vw,30px); line-height:1.45; margin:0 0 12px; }
    .below p { color:var(--muted); margin:0 0 20px; }
    .mail-note { margin:22px auto 0; padding:20px; border-radius:20px; background:#f4fbfb; border:1px solid #d9eeee; color:var(--ink); font-weight:700; }
    .archive { margin-top:34px; }
    .archive-header { text-align:center; margin-bottom:18px; }
    .archive-header h2 { font-size:clamp(22px,3vw,30px); line-height:1.45; margin:0 0 10px; }
    .archive-header p { color:var(--muted); margin:0 auto; max-width:680px; }
    .note { font-size:13px; color:#718087; margin-top:14px; }
    @media (max-width:760px){ .wrap{padding-top:28px;} }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="label">森下さん対談動画 3</div>
      <h1>AI×B2Bプロジェクト<br>の全貌</h1>
      <p class="lead">学ぶだけで終わらせず、自分の経験や視点を、企業やお店に役立つ仕事の形へどう変えていくか。サービス、コンテンツ、LP、提案資料まで、4ヶ月でどう形にしていくのか。江藤せいやと森下さんで話しました。</p>
    </section>

    <section class="card">
      <div class="video">
        <iframe src="https://player.vimeo.com/video/1198959383?h=2e0ed95ea2&title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="森下さん対談動画3"></iframe>
      </div>

      <div class="below">
        <div class="mail-note">AI×B2Bプロジェクトの募集受付はメルマガで行います<br>楽しみにお待ちください🎉</div>
      </div>
    </section>

    <section class="card archive">
      <div class="archive-header">
        <div class="label">まだ見ていない方へ</div>
        <h2>対談2も、このページ下部から見られます</h2>
        <p>AIの可能性を学ぶだけで終わらせず、企業やお店に役立つ仕事へどう変えていくか。B2B・現場の課題・これからの仕事の作り方について話した対談です。</p>
      </div>
      <div class="video">
        <iframe src="https://player.vimeo.com/video/1197961651?h=737a9aa621&title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="森下さん対談動画2"></iframe>
      </div>
    </section>
  </main>
</body>
</html>
