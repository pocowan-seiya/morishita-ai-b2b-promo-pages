<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>対談1｜AI時代の大きなチャンスを、自分の仕事に変えていく</title>
  <meta name="description" content="江藤せいやと森下さんの対談動画1。AI時代の大きなチャンスを、自分の仕事やビジョンにどう生かしていくかを話しています。">
  <style>
    :root { --ink:#172026; --muted:#5c6870; --line:#e5edf0; --bg:#f6fbfb; --card:#ffffff; --accent:#16a3a8; --accent-dark:#0d7f84; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(180deg,#f4fbfb 0%,#ffffff 42%,#f7fbfa 100%); line-height:1.8; }
    .wrap { width:min(980px, calc(100% - 32px)); margin:0 auto; padding:42px 0 56px; }
    .hero { text-align:center; margin-bottom:28px; }
    .label { display:inline-block; padding:6px 14px; border:1px solid #bfe7e9; border-radius:999px; color:#0d7f84; background:#ecfbfb; font-weight:700; font-size:14px; margin-bottom:16px; }
    h1 { font-size:clamp(28px,5vw,46px); line-height:1.32; letter-spacing:.02em; margin:0 0 16px; font-weight:800; }
    .lead { color:var(--muted); font-size:clamp(16px,2vw,19px); margin:0 auto; max-width:720px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:26px; box-shadow:0 18px 50px rgba(24,70,72,.08); padding:clamp(18px,3vw,30px); }
    .video { position:relative; width:100%; aspect-ratio:16/9; border-radius:18px; overflow:hidden; background:#dfe9ea; }
    .video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
    .below { max-width:760px; margin:28px auto 0; text-align:center; }
    .below h2 { font-size:clamp(22px,3vw,30px); line-height:1.45; margin:0 0 12px; }
    .below p { color:var(--muted); margin:0 0 20px; }
    .mail-note { margin:22px auto 0; padding:20px; border-radius:20px; background:#f4fbfb; border:1px solid #d9eeee; color:var(--ink); font-weight:700; }
    .note { font-size:13px; color:#718087; margin-top:14px; }
    @media (max-width:760px){ .wrap{padding-top:28px;} }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="label">森下さん対談動画 1</div>
      <h1>AI時代の大きなチャンスを、<br>自分の仕事に変えていく入口</h1>
      <p class="lead">AIがすべてに浸透していくこれからの時代に、自分のビジョンをどう形にして、仕事や未来をどう広げていくか。江藤せいやと森下さんで話しました。</p>
    </section>

    <section class="card">
      <div class="video">
        <iframe src="https://player.vimeo.com/video/1197961587?h=5b78b9f19d&title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="森下さん対談動画1"></iframe>
      </div>

      <div class="below">
        <h2>対談2では、AIの可能性を最大限に引き出す<br>「ある穴場の領域」について話しています。</h2>
        <div class="mail-note">続きを見たい方は、メールマガジン内の「対談2を見る」リンクを押してください。</div>
        <div class="note">※この視聴ページ内には、対談2へ進むボタンは配置していません。</div>
      </div>
    </section>
  </main>
</body>
</html>
