<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>クリックありがとうございます｜対談2のご案内</title>
  <meta name="description" content="対談2の視聴リンクを自動返信メールでお送りしました。メールをご確認ください。">
  <style>
    :root { --ink:#172026; --muted:#5c6870; --line:#e5edf0; --bg:#f6fbfb; --card:#ffffff; --accent:#16a3a8; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(180deg,#f4fbfb 0%,#ffffff 58%,#f7fbfa 100%); line-height:1.8; }
    .wrap { width:min(760px, calc(100% - 32px)); padding:36px 0; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:28px; box-shadow:0 18px 50px rgba(24,70,72,.08); padding:clamp(26px,5vw,48px); text-align:center; }
    .label { display:inline-block; padding:6px 14px; border:1px solid #bfe7e9; border-radius:999px; color:#0d7f84; background:#ecfbfb; font-weight:700; font-size:14px; margin-bottom:18px; }
    h1 { font-size:clamp(28px,5vw,42px); line-height:1.35; margin:0 0 16px; font-weight:800; }
    p { color:var(--muted); font-size:clamp(16px,2vw,18px); margin:0 auto 18px; max-width:590px; }
    .box { margin:26px auto 0; padding:20px; border-radius:20px; background:#f4fbfb; border:1px solid #d9eeee; text-align:left; max-width:560px; }
    .box strong { display:block; color:var(--ink); margin-bottom:6px; }
    .small { margin-top:20px; font-size:13px; color:#718087; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="label">対談2のご案内</div>
      <h1>クリックありがとうございます。</h1>
      <p>対談2の視聴リンクを、自動返信メールでお送りしました。</p>
      <p>数分以内にメールが届きますので、受信箱をご確認ください。</p>
      <div class="box">
        <strong>メールが見つからない場合</strong>
        迷惑メールフォルダ、プロモーションタブ、別フォルダに入っていないか確認してください。<br>
        差出人名は「江藤せいや」または「カラフル通信」になる想定です。
      </div>
      <div class="small">※このページ自体には対談2の動画URLを直接掲載せず、メール確認へ誘導する設計です。</div>
    </section>
  </main>
</body>
</html>
